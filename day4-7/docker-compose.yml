services:

  # ── PostgreSQL database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-blog_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Blog API ─────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database (Day 5)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-blog_db}
      # JWT (Day 6)
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # App
      - BLOG_DEBUG=${BLOG_DEBUG:-false}
      - BLOG_LOG_LEVEL=${BLOG_LOG_LEVEL:-INFO}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy   # Chờ DB sẵn sàng rồi mới start
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data: