$kind: http-request
description: Đặt hàng từ giỏ hàng hiện tại — order_id tự lưu vào biến
url: "{{base_url}}/api/v1/orders/checkout/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "shipping_address": "123 Đường Láng, Đống Đa, Hà Nội",
      "note": "Giao giờ hành chính, gọi trước khi đến"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.id) {
        pm.collectionVariables.set('order_id', res.id);
        console.log('Order ID đã lưu:', res.id);
      }
    language: text/javascript
order: 1000
