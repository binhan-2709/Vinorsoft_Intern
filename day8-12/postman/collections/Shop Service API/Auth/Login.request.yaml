$kind: http-request
description: Đăng nhập — token tự động lưu vào biến {{access_token}}
url: "{{base_url}}/api/v1/auth/token/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@shop.com",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.access) {
        pm.collectionVariables.set('access_token', res.access);
        pm.collectionVariables.set('refresh_token', res.refresh);
        console.log('Token đã được lưu tự động!');
      }
    language: text/javascript
order: 2000
