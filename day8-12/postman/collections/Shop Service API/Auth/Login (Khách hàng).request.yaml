$kind: http-request
description: Đăng nhập bằng tài khoản khách hàng
url: "{{base_url}}/api/v1/auth/token/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "khach@shop.com",
      "password": "khach123"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.access) {
        pm.collectionVariables.set('access_token', res.access);
        pm.collectionVariables.set('refresh_token', res.refresh);
        console.log('Token khách hàng đã được lưu!');
      }
    language: text/javascript
order: 3000
