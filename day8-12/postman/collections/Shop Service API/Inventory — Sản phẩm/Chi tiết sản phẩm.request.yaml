$kind: http-request
description: Xem chi tiết sản phẩm theo slug
url: "{{base_url}}/api/v1/inventory/products/iphone-15-pro/"
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.slug) {
        pm.collectionVariables.set('product_slug', res.slug);
        console.log('Slug đã lưu:', res.slug);
      }
    language: text/javascript
order: 5000
